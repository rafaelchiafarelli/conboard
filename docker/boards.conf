# conboard build targets — the list of boards we can cross-build for.
#
# Only boards with working USB-OTG / USB-gadget support belong here (that is
# conboard's whole purpose). Adding a new board = add one line below, then:
#     ./build-cross.sh <board-id>
# List what's available with:
#     ./build-cross.sh list
#
# Columns (pipe-separated):
#   board-id | docker platform | arch  | goes in / description                       | usb-otg status
# ---------------------------------------------------------------------------------------------------
  zero3      | linux/arm64      | arm64 | Orange Pi Zero 3 (Allwinner H618, 64-bit)   | verified working
  zero       | linux/arm/v7     | armhf | Orange Pi Zero (Allwinner H3, 32-bit)       | expected (original board)
  rpi64      | linux/arm64      | arm64 | Raspberry Pi 3/4/5 & Zero 2 W (64-bit OS)   | dwc2, untested on conboard
  rpi32      | linux/arm/v7     | armhf | Raspberry Pi Zero / 1 / 2 (32-bit OS)       | dwc2, untested on conboard
